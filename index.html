<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syntrix Token Presale</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@tonconnect/sdk@latest/dist/tonconnect.min.js"></script>
</head>
<body>

<div class="container">
<h1>Syntrix Token Presale</h1>
<p class="price">Price: $0.01 | Listing: $0.05</p>

<button id="connectWallet">Connect Wallet</button>

<div class="progress-section">
<p>Raised: <span id="raised">0</span> / 200,000 TON</p>
<div class="progress-bar">
<div id="progressFill"></div>
</div>
</div>

<h2>Buy Syntrix Tokens</h2>

<label>You Pay (TON)</label>
<input type="number" id="amountIn" value="10">

<label>You Get (SYN)</label>
<input type="number" id="amountOut" value="1000" readonly>

<button id="buyToken">Buy Tokens</button>

<footer>
<p>© Syntrix 2026</p>
</footer>
</div>

<script src="app.js"></script>

</body>
</html>
